<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="description"

    <meta name="author"
        content="Itoro Etim Akpan">

    <title>Akwa Ibom Chamber Directory</title>

    <!-- Google Fonts -->
    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
        rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon"
        href="images/ibom-hotel-3-1.png">

    <!-- Open Graph -->

        content="Akwa Ibom Chamber Directory">

    <meta property="og:description"
        content="Discover trusted businesses and networking opportunities in the Akwa Ibom Chamber Directory.">

    <meta property="og:image"

    <meta property="og:url"
        content="https://elderakpan.github.io/wdd231/chamber/directory.html">

    <!-- CSS -->
    <link rel="stylesheet"
        href="styles/normalize.css">

    <link rel="stylesheet"
        href="styles/small.css">

    <link rel="stylesheet"
        href="styles/larger.css">

</head>

<body>

    <header class="site-header">

        <div class="logo">

            <img src="images/chamber.jpg"
                alt="Akwa Ibom Chamber Logo"
                width="60"
                height="60">

            <span>Akwa Ibom Chamber</span>

        </div>

        <button id="menu-button"
            aria-label="Open Navigation Menu"
            aria-expanded="false"
            aria-controls="navigation">

    </header>

    <nav id="navigation">

        <ul>

            <li>
                <a href="index.html">
                    Home
                </a>
            </li>

            <li>
                <a href="directory.html"
                    class="active">
                    Directory
                </a>
            </li>

            <li>
                <a href="join.html">
                    Join
                </a>
            </li>

            <li>
                <a href="contact.html">
                    Contact
                </a>
            </li>

        </ul>

    </nav>

    <main>

        <h1>Akwa Ibom Chamber Directory</h1>

        <section class="card">

            <h2>Business Directory</h2>

            <p>
                Explore trusted businesses, organizations,
                and services registered with the
                Akwa Ibom Chamber of Commerce.
            </p>

            <div class="buttons">

                <button id="gridBtn"
                    type="button">
                    Grid
                </button>

                <button id="listBtn"
                    type="button">
                    List
                </button>

            </div>

            <section id="members"
                class="members">

                <p>
                    Loading members...
                </p>

            </section>

        </section>

    </main>

    <footer>

        <p>
            &copy; <span id="year"></span>
            Itoro Etim Akpan | WDD231
        </p>

        <p>
            Last Modified:

        </p>

    <!-- JavaScript -->
    <script defer
        src="scripts/navigation.js"></script>

    <script defer
        src="scripts/date.js"></script>

    <script defer
