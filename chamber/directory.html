<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Akwa Ibom Chamber of Commerce Business Directory">
    <meta name="author" content="Itoro Akpan">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Business Directory | Akwa Ibom Chamber</title>

    <!-- CSS -->
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/chamber.css">
    <link rel="stylesheet" href="styles/chamber-large.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <!-- JS -->
    <script src="scripts/directory.js" defer></script>
</head>

<body>

    <!-- HEADER -->
    <header>

        <div class="logo-container">
            <img src="images/chamber.jpg" alt="Akwa Ibom Chamber Logo" width="80" height="80">

            <div>
                <h1>Akwa Ibom Chamber</h1>
                <p>Business Directory</p>
            </div>
        </div>

        <button id="menu-button" aria-label="Menu" aria-expanded="false">☰</button>

        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="directory.html" class="active">Directory</a></li>
                <li><a href="join.html">Join</a></li>
                <li><a href="discover.html">Discover</a></li>
            </ul>
        </nav>

    </header>

    <!-- MAIN -->
    <main>

        <section class="directory-header">
            <h2>Member Business Directory</h2>
            <p>Explore registered businesses in Akwa Ibom State</p>
        </section>

        <!-- SEARCH + CONTROLS -->
        <section class="view-controls">

            <button id="grid-view">Grid View</button>
            <button id="list-view">List View</button>

            <input type="text" id="search" placeholder="Search businesses...">

        </section>

        <!-- DIRECTORY CONTAINER -->
        <section id="directory-container" class="directory-grid">
            <!-- JS loads content here -->
        </section>

    </main>

    <!-- FOOTER -->
    <footer>

        <div class="footer-info">
            <h3>Akwa Ibom Chamber of Commerce</h3>
            <p>Uyo, Akwa Ibom State, Nigeria</p>
            <p>Email: info@akwaibomchamber.org</p>
        </div>

        <div class="footer-meta">
            <p>&copy; <span id="currentyear"></span> Akwa Ibom Chamber</p>
            <p id="lastModified"></p>
        </div>

    </footer>

</body>

</html>
